<div class="tasks-container">
  <div class="tasks-header">
    <h2>Tasks</h2>
    <button class="btn-add bg-gray-500 rounded-2xl px-8 py-2 my-2" (click)="openForm()">
      + Add Task
    </button>
  </div>

  <app-table
    [data]="filterdTasks()"
    [columns]="columns"
    (deleteRow)="onDeleteClick($event)"
    (rowEdited)="onEditClick($event)"
  />

  <app-task-form [task]="selectedTask()" (submitForm)="onConfirmForm($event)" />

  <app-delete [task]="selectedTask()" (confirmDelete)="onConfirmDelete()" />
</div>
