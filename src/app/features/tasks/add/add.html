  <app-form-shell [form]="form" title="Add User" (submitForm)="save($event)">
    <div class="flex flex-col">
      <label>ID</label>
      <input formControlName="id" class="border border-amber-500 rounded-2xl" />
    </div>

    <div class="flex flex-col">
      <label>Name</label>
      <input formControlName="name" class="border border-amber-500 rounded-2xl" />
    </div>
  </app-form-shell>
